services:
  # ─── Database ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skillsight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillsight_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-skillsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-skillsight} -d ${POSTGRES_DB:-skillsight}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skillsight_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: skillsight_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./services/api:/app
      - model_cache:/app/.cache
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: skillsight_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./services/api:/app
      - model_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Flower (monitoring) ──────────────────────────────────────────
  flower:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: skillsight_flower
    restart: unless-stopped
    command: celery -A app.celery_app flower --port=5555
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - '5555:5555'
    depends_on:
      - redis
      - worker

  # ─── Watchtower (auto-update containers on new image) ───────────────────
  # NOTE: Only useful after CI/CD pushes images to ghcr.io
  # Enable in docker-compose.prod.yml or after setting up GitHub Actions
  watchtower:
    image: containrrr/watchtower
    container_name: skillsight_watchtower
    restart: unless-stopped
    profiles: ['prod']
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: 'true'
      DOCKER_API_VERSION: '1.43'
    command: --cleanup skillsight_api skillsight_worker

volumes:
  postgres_data:
  model_cache:
