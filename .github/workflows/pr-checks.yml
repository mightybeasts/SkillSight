name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  docker-build-check:
    name: Docker Build Check (no push)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'api' && './services/api' || './apps/web' }}
          file: ${{ matrix.service == 'api' && './services/api/Dockerfile' || './apps/web/Dockerfile' }}
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
