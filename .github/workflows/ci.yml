name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/skillsight

jobs:
  # ─── Lint & Type Check (web) ──────────────────────────────────────────────
  lint-web:
    name: Lint & Type Check (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace=apps/web
      - run: npm run type-check --workspace=apps/web

  # ─── Python tests (API) ───────────────────────────────────────────────────
  test-api:
    name: Test FastAPI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: skillsight_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: skillsight_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run tests
        working-directory: services/api
        env:
          DATABASE_URL: postgresql+asyncpg://skillsight_test:test_password@localhost:5432/skillsight_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          API_SECRET_KEY: test-secret-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  # ─── Build Docker images ──────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-web, test-api]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api
            context: ./services/api
            dockerfile: ./services/api/Dockerfile
          - name: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Trigger local deployment (self-hosted runner) ───────────────────────
  deploy-local:
    name: Deploy to Local Docker Desktop
    runs-on: self-hosted   # <-- your local machine runner
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/api:latest
          docker pull ${{ env.IMAGE_PREFIX }}/web:latest

      - name: Restart services with new images
        run: |
          docker compose pull api web worker
          docker compose up -d api web worker
          docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          echo "Deployment successful!"
